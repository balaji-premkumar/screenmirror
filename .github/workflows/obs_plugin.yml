name: Build OBS Plugin

on:
  push:
    paths:
      - 'desktopApp/obs_plugin/**'
  pull_request:
    paths:
      - 'desktopApp/obs_plugin/**'
  workflow_dispatch:

jobs:
  build_linux:
    name: Build Plugin (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libobs-dev librt-dev

      - name: Build Plugin
        run: |
          mkdir -p build
          gcc -shared -fPIC -o build/mirror-source.so mirror_source.c -I/usr/include/obs -lobs -lrt
        working-directory: desktopApp/obs_plugin

      - name: Upload Linux Plugin
        uses: actions/upload-artifact@v4
        with:
          name: obs-plugin-linux
          path: desktopApp/obs_plugin/build/mirror-source.so

  build_windows:
    name: Build Plugin (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Plugin
        run: |
          # Note: This requires OBS headers and libobs.lib. 
          # In a real environment, you'd download the OBS SDK.
          # For now, we'll mark this as a placeholder for the SDK integration.
          echo "Windows OBS Plugin build requires OBS SDK"
